name: Deploy Interaction Lambda

on:
  push:
    branches: [ master ]
    paths:
      - 'interaction_lambda.py'
      - 'game_parser.py'
      - 'scoreboard.py'
      - '.github/workflows/deploy-interaction.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    env:
      AWS_DEFAULT_REGION: us-east-1
      LAMBDA_FUNCTION_NAME: daily-game-play

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_DEFAULT_REGION }}

    - name: Package Lambda function
      run: |
        echo "Installing PyNaCl and requests in Lambda-compatible container..."
        docker run --rm -v "$PWD":/var/task public.ecr.aws/sam/build-python3.14:latest \
          bash -c "pip install PyNaCl requests -t /var/task/package/"
        cd package && zip -r ../function.zip . && cd ..
        zip function.zip interaction_lambda.py game_parser.py scoreboard.py
        echo "Package created: $(ls -lh function.zip | awk '{print $5}')"

    - name: Deploy to Lambda
      run: |
        echo "Deploying to Lambda function: $LAMBDA_FUNCTION_NAME"
        aws lambda update-function-code \
          --function-name $LAMBDA_FUNCTION_NAME \
          --zip-file fileb://function.zip \
          --output json | jq '.LastModified'

    - name: Wait for deployment
      run: |
        echo "Waiting for Lambda update to complete..."
        aws lambda wait function-updated \
          --function-name $LAMBDA_FUNCTION_NAME
        echo "Deployment complete!"
